name: Farkle
options:
  bundleIdPrefix: com.kevin.farkle
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 3
    MARKETING_VERSION: "1.0.1"
targets:
  Farkle:
    type: application
    platform: iOS
    sources:
      - path: Farkle
    resources:
      - path: Farkle/Resources/Assets.xcassets
        optional: true
      - path: Farkle/Resources/Fonts
        optional: true
    info:
      path: Farkle/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: PaperBackground
          UIImageName: LaunchLogo
        NSLocalNetworkUsageDescription: "Farkle uses local networking so friends nearby can watch your score live. Nothing leaves your devices."
        NSPhotoLibraryAddUsageDescription: "Save the winner image to your Photos so you can keep or share it later."
        NSBonjourServices:
          - _farkle-game._tcp
          - _farkle-game._udp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
          - IBMPlexSans-Regular.ttf
          - IBMPlexSans-Medium.ttf
          - IBMPlexSans-SemiBold.ttf
          - IBMPlexSans-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.farkle
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  FarkleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FarkleTests
    dependencies:
      - target: Farkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.farkle.tests
